[[redirects]]
  from = "http://humanaid.digital/*"
  to = "https://humanaid.digital/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.humanaid.digital/*"
  to = "https://humanaid.digital/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.humanaid.digital/*"
  to = "https://humanaid.digital/:splat"
  status = 301
  force = true

# 추가 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
